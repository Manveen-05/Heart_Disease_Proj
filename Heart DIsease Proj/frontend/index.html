<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Stroke Prediction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Heart Stroke Prediction</h1>
            <p>Enter your details below to get a prediction powered by machine learning. Simple. Intuitive. And never boring.</p>
        </header>

        <div class="form-container">
            <form id="predictionForm" class="glass-form">
            <div class="form-grid">
                <!-- Age -->
                <div class="form-group">
                    <label for="age">Age</label>
                    <div class="input-with-value">
                        <input type="range" id="age" name="age" min="18" max="100" value="40" oninput="updateValue('age', this.value)">
                        <span id="age-val" class="value-display">40</span>
                    </div>
                </div>

                <!-- Sex -->
                <div class="form-group">
                    <label for="sex">Sex</label>
                    <div class="custom-select-wrapper">
                        <select id="sex" name="sex" required>
                            <option value="" disabled selected>Select Sex</option>
                            <option value="M">Male (M)</option>
                            <option value="F">Female (F)</option>
                        </select>
                    </div>
                </div>

                <!-- Chest Pain Type -->
                <div class="form-group">
                    <label for="chest_pain">Chest Pain Type</label>
                    <div class="custom-select-wrapper">
                        <select id="chest_pain" name="chest_pain" required>
                            <option value="" disabled selected>Select Type</option>
                            <option value="ATA">Atypical Angina (ATA)</option>
                            <option value="NAP">Non-Anginal Pain (NAP)</option>
                            <option value="TA">Typical Angina (TA)</option>
                            <option value="ASY">Asymptomatic (ASY)</option>
                        </select>
                    </div>
                </div>

                <!-- Resting BP -->
                <div class="form-group">
                    <label for="resting_bp">Resting BP (mm Hg)</label>
                    <input type="number" id="resting_bp" name="resting_bp" min="80" max="200" value="120" required placeholder="e.g. 120">
                </div>

                <!-- Cholesterol -->
                <div class="form-group">
                    <label for="cholesterol">Cholesterol (mg/dL)</label>
                    <input type="number" id="cholesterol" name="cholesterol" min="100" max="600" value="200" required placeholder="e.g. 200">
                </div>

                <!-- Fasting BS -->
                <div class="form-group">
                    <label for="fasting_bs">Fasting Blood Sugar > 120 mg/dL</label>
                    <div class="custom-select-wrapper">
                        <select id="fasting_bs" name="fasting_bs" required>
                            <option value="0" selected>No (0)</option>
                            <option value="1">Yes (1)</option>
                        </select>
                    </div>
                </div>

                <!-- Resting ECG -->
                <div class="form-group">
                    <label for="resting_ecg">Resting ECG</label>
                    <div class="custom-select-wrapper">
                        <select id="resting_ecg" name="resting_ecg" required>
                            <option value="" disabled selected>Select ECG</option>
                            <option value="Normal">Normal</option>
                            <option value="ST">ST-T wave abnormality</option>
                            <option value="LVH">Left ventricular hypertrophy</option>
                        </select>
                    </div>
                </div>

                <!-- Max Heart Rate -->
                <div class="form-group">
                    <label for="max_hr">Max Heart Rate</label>
                    <div class="input-with-value">
                        <input type="range" id="max_hr" name="max_hr" min="60" max="220" value="150" oninput="updateValue('max_hr', this.value)">
                        <span id="max_hr-val" class="value-display">150</span>
                    </div>
                </div>

                <!-- Exercise Angina -->
                <div class="form-group">
                    <label for="exercise_angina">Exercise-Induced Angina</label>
                    <div class="custom-select-wrapper">
                        <select id="exercise_angina" name="exercise_angina" required>
                            <option value="" disabled selected>Select Option</option>
                            <option value="Y">Yes (Y)</option>
                            <option value="N">No (N)</option>
                        </select>
                    </div>
                </div>

                <!-- Oldpeak -->
                <div class="form-group">
                    <label for="oldpeak">Oldpeak (ST Depression)</label>
                    <div class="input-with-value">
                        <input type="range" id="oldpeak" name="oldpeak" min="0.0" max="6.0" step="0.1" value="1.0" oninput="updateValue('oldpeak', this.value)">
                        <span id="oldpeak-val" class="value-display">1.0</span>
                    </div>
                </div>

                <!-- ST Slope -->
                <div class="form-group">
                    <label for="st_slope">ST Slope</label>
                    <div class="custom-select-wrapper">
                        <select id="st_slope" name="st_slope" required>
                            <option value="" disabled selected>Select Slope</option>
                            <option value="Up">Upsloping (Up)</option>
                            <option value="Flat">Flat</option>
                            <option value="Down">Downsloping (Down)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" id="predictBtn" class="btn-primary">
                    <span class="btn-text">Run Prediction</span>
                    <div class="loader hidden" id="btnLoader"></div>
                </button>
            </div>
        </form>
        </div>

        <div id="resultCard" class="result-card hidden">
            <div class="result-header">
                <h2>Prediction Result</h2>
                <button type="button" id="closeResultBtn" class="close-btn">&times;</button>
            </div>
            <div class="result-content">
                <div class="status-icon" id="resultIcon"></div>
                <h3 id="resultTitle">Analyzing...</h3>
                <p id="resultDesc">Please wait while we process your data.</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
